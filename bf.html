<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>BookVerse Pro</title>

    <link rel="stylesheet" href="bf.css">

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <!-- Navbar -->

    <nav>

        <div class="logo">
            📚 BookVerse Pro
        </div>

        <div class="nav-actions">

            <button id="themeBtn">
                🌙
            </button>

        </div>

    </nav>

    <!-- Hero -->

    <section class="hero">

        <h1>
            Discover Your Next Favorite Book
        </h1>

        <p>
            Search millions of books instantly using Open Library API
        </p>

        <div class="search-container">

            <input
                type="text"
                id="searchInput"
                placeholder="Search books, authors, topics...">

            <button id="searchBtn">
                Search
            </button>

            <button id="voiceBtn">
                🎤
            </button>

        </div>

    </section>

    <!-- Dashboard -->

    <section class="dashboard">

        <div class="stat-card">

            <h2 id="totalSearches">
                0
            </h2>

            <p>
                Searches
            </p>

        </div>

        <div class="stat-card">

            <h2 id="favoriteCount">
                0
            </h2>

            <p>
                Favorites
            </p>

        </div>

        <div class="stat-card">

            <h2 id="readingCount">
                0
            </h2>

            <p>
                Reading List
            </p>

        </div>

        <div class="stat-card">

            <h2 id="ratedCount">
                0
            </h2>

            <p>
                Rated Books
            </p>

        </div>

    </section>

    <!-- Categories -->

    <section class="categories">

        <button class="category-btn">
            Java
        </button>

        <button class="category-btn">
            JavaScript
        </button>

        <button class="category-btn">
            Programming
        </button>

        <button class="category-btn">
            Business
        </button>

        <button class="category-btn">
            Science
        </button>

        <button class="category-btn">
            History
        </button>

        <button class="category-btn">
            Fiction
        </button>

    </section>

    <!-- Search History -->

    <section class="history-section">

        <h2>
            🕒 Recent Searches
        </h2>

        <div
            id="historyList"
            class="history-list">

        </div>

    </section>

    <!-- Search Results -->

    <main>

        <section>

            <div class="section-title">

                <h2>
                    🔍 Search Results
                </h2>

            </div>

            <div
                id="booksContainer"
                class="books-grid">

            </div>

        </section>

        <!-- Favorites -->

        <section>

            <div class="section-title">

                <h2>
                    ❤️ Favorites
                </h2>

            </div>

            <div
                id="favoritesContainer"
                class="books-grid">

            </div>

        </section>

        <!-- Reading List -->

        <section>

            <div class="section-title">

                <h2>
                    📖 Reading List
                </h2>

            </div>

            <div
                id="readingListContainer"
                class="books-grid">

            </div>

        </section>

    </main>

    <!-- Modal -->

    <div
        id="bookModal"
        class="modal">

        <div class="modal-content">

            <span
                id="closeModal"
                class="close-btn">

                ✖

            </span>

            <div
                id="modalBody">

            </div>

        </div>

    </div>

    <!-- Loader -->

    <div
        id="loader"
        class="loader">

        Loading Books...

    </div>

    <!-- Toast -->

    <div
        id="toast">

    </div>

    <script src="bf.js"></script>

</body>

</html>
